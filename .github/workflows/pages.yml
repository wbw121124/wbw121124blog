name: Optimized Blog CI/CD
 
on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main,master]
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Fontist
        uses: fontist/setup-fontist@v2
        with:
          cache: true
      
      - name: Install fallback fonts with Fontist
        run: |
          # 微软 Core 字体（大部分 fallback 需要）
          fontist install "Consolas" --accept-all-licenses --hide-licenses
          fontist install "Courier New" --accept-all-licenses --hide-licenses
          fontist install "Times New Roman" --accept-all-licenses --hide-licenses
          fontist install "Arial" --accept-all-licenses --hide-licenses
          fontist install "Georgia" --accept-all-licenses --hide-licenses
          fontist install "Comic Sans MS" --accept-all-licenses --hide-licenses
          
          # 开源等宽字体
          fontist install "Cascadia Code" --accept-all-licenses --hide-licenses || true
          fontist install "Liberation Mono" --accept-all-licenses --hide-licenses || true
          fontist install "DejaVu Sans" --accept-all-licenses --hide-licenses || true
          
      - name: Verify fonts installed
        run: |
          echo "=== Fonts available for fallback ==="
          fc-list | grep -E "Consolas|Courier|Times|Arial|Georgia|Comic|Cascadia|Liberation|DejaVu" | head -20

      - name: Install
        run: |
          npm install
     
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Site
        run: |
          npm run build
 
      - name: Add .nojekyll
        run: touch dist/.nojekyll
 
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: wbw121124/wbw121124blog
          publish_branch: gh-pages
          publish_dir: ./dist
          commit_message: "Deploy: ${{ github.sha }}"

